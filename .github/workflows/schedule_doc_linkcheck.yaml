name: Docs link check

on:
  schedule:
    # GitHub cron uses UTC. This runs every Sunday at 20:00 UTC+8.
    - cron: '0 12 * * 0'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'docs/source/**/*.md'
  workflow_dispatch:

defaults:
  run:
    shell: bash -el {0}

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: docs-linkcheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linkcheck:
    name: Markdown link check
    runs-on: linux-amd64-cpu-2-hk
    container:
      image: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann:9.0.0-910b-ubuntu22.04-py3.12
    timeout-minutes: 30
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7

      - name: Collect changed docs files
        id: changed-docs
        if: ${{ github.event_name == 'pull_request' }}
        uses: tj-actions/changed-files@v47
        with:
          use_rest_api: true
          files: |
            docs/source/**/*.md

      - name: Install docs dependencies
        if: ${{ github.event_name != 'pull_request' || steps.changed-docs.outputs.any_changed == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt

      - name: Run full link check
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          python .github/workflows/scripts/check_md_links.py docs/source --exclude 'docs/source/zh'

      - name: Run link check for changed docs
        if: ${{ github.event_name == 'pull_request' && steps.changed-docs.outputs.any_changed == 'true' }}
        env:
          CHANGED_DOCS: ${{ steps.changed-docs.outputs.all_changed_files }}
        run: |
          # shellcheck disable=SC2153
          read -r -a changed_docs <<< "${CHANGED_DOCS}"
          echo "Changed docs files:"
          printf '  %s\n' "${changed_docs[@]}"
          python .github/workflows/scripts/check_md_links.py "${changed_docs[@]}"
