name: Hitest

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      HITEST_APIG_APPCODE:
        required: true
      HITEST_KEY:
        required: true
      HITEST_SECRET:
        required: true
    outputs:
      hitest_paths:
        description: 'Content of recommended_pytest_paths.txt (one path per line)'
        value: ${{ jobs.run-hitest.outputs.hitest_paths }}

defaults:
  run:
    shell: bash -el {0}

jobs:
  run-hitest:
    runs-on: linux-amd64-cpu-8-hk
    outputs:
      hitest_paths: ${{ steps.export-paths.outputs.hitest_paths }}
    steps:
      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Git safe directory config
        run: git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Execute hitest entry
        env:
          AUROGON_API_PREFIX: https://174e1b821a8446f38998a67186ba766e.apic.cn-southwest-2.huaweicloudapis.com/aurogon_service
          HITEST_APIG_APPCODE: ${{ secrets.HITEST_APIG_APPCODE }}
          HITEST_KEY: ${{ secrets.HITEST_KEY }}
          HITEST_SECRET: ${{ secrets.HITEST_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 .github/workflows/scripts/run_hitest.py

      - name: Upload recommended pytest paths artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommended-pytest-paths
          path: .github/workflows/scripts/recommended_pytest_paths.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Export hitest_paths output
        id: export-paths
        if: always()
        run: |
          FILE=".github/workflows/scripts/recommended_pytest_paths.txt"
          if [ -f "$FILE" ]; then
            {
              echo "hitest_paths<<EOF"
              cat "$FILE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "hitest_paths=" >> "$GITHUB_OUTPUT"
          fi
