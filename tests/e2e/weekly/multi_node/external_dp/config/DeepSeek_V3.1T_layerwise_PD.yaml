test_name: "DeepSeek_V3.1T_layerwise_PD"
model: "Eco-Tech/DeepSeek-V3.1-Terminus-w8a8-mtp-QuaRot"
num_nodes: 4
npu_per_node: 16

routing:
  type: "disaggregated_prefill"
  groups:
    prefiller: [ 0, 1 ]
    decoder: [ 2, 3 ]

config:
  - node_index: 0
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 2
    dp_size_local: 2
    dp_rank_start: 0
    tp_size: 8
    dp_address: "${NODE_0_IP}"

  - node_index: 1
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 2
    dp_size_local: 2
    dp_rank_start: 0
    tp_size: 8
    dp_address: "${NODE_1_IP}"

  - node_index: 2
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 32
    dp_size_local: 16
    dp_rank_start: 0
    tp_size: 1
    dp_address: "${NODE_2_IP}"

  - node_index: 3
    port_start: 7100
    dp_rpc_port: 12321
    dp_size: 32
    dp_size_local: 16
    dp_rank_start: 16
    tp_size: 1
    dp_address: "${NODE_2_IP}"

env_common: &env_common
  SERVER_PORT: "${PORT}"
  ASCEND_RT_VISIBLE_DEVICES: "${VISIBLE_DEVICES}"
  ASCEND_LOG_DEVICE_FLUSH_TIMEOUT: "0"
  VLLM_RPC_TIMEOUT: "3600000"
  VLLM_EXECUTE_MODEL_TIMEOUT_SECONDS: "30000"
  HCCL_EXEC_TIMEOUT: "204"
  HCCL_CONNECT_TIMEOUT: "400"
  LD_PRELOAD: "/usr/lib/aarch64-linux-gnu/libjemalloc.so.2:$LD_PRELOAD"
  OMP_PROC_BIND: "false"
  OMP_NUM_THREADS: "10"
  PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
  VLLM_ASCEND_ENABLE_MLAPO: "1"
  TASK_QUEUE_ENABLE: 1
  HCCL_OP_EXPANSION_MODE: "AIV"
  VLLM_USE_V1: "1"
  PYTHONHASHSEED: "0"
  ASCEND_CONNECT_TIMEOUT: "10000"
  ASCEND_TRANSFER_TIMEOUT: "10000"
  ASCEND_BUFFER_POOL: "4:8"
  LD_LIBRARY_PATH: "/usr/local/Ascend/ascend-toolkit/latest/python/site-packages/mooncake:$LD_LIBRARY_PATH"

env_prefill: &env_prefill
  <<: *env_common
  HCCL_BUFFSIZE: "256"
  VLLM_ASCEND_ENABLE_FLASHCOMM1: "1"

env_decode: &env_decode
  <<: *env_common
  HCCL_BUFFSIZE: "1100"

templates:
  - node_index: 0
    envs:
      <<: *env_prefill
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port
      - $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "70000"
      - --max-num-batched-tokens
      - "16384"
      - --max-num-seqs
      - "8"
      - --enforce-eager
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.9"
      - --quantization
      - "ascend"
      - --no-enable-prefix-caching
      - --speculative-config
      - '{"method": "deepseek_mtp", "num_speculative_tokens": 1}'
      - --additional-config
      - '{"recompute_scheduler_enable":true}'
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeLayerwiseConnector", "kv_role": "kv_producer", "kv_port": "30000", "engine_id": "0", "kv_connector_extra_config": {"use_ascend_direct": true,"prefill": {"dp_size": 2, "tp_size": 8}, "decode": {"dp_size": 32, "tp_size": 1}}}'

  - node_index: 1
    envs:
      <<: *env_prefill
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port
      - $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "70000"
      - --max-num-batched-tokens
      - "16384"
      - --max-num-seqs
      - "8"
      - --enforce-eager
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.9"
      - --quantization
      - "ascend"
      - --no-enable-prefix-caching
      - --speculative-config
      - '{"method": "deepseek_mtp", "num_speculative_tokens": 1}'
      - --additional-config
      - '{"recompute_scheduler_enable":true}'
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeLayerwiseConnector", "kv_role": "kv_producer", "kv_port": "30000", "engine_id": "0", "kv_connector_extra_config": {"use_ascend_direct": true,"prefill": {"dp_size": 2, "tp_size": 8}, "decode": {"dp_size": 32, "tp_size": 1}}}'

  - node_index: 2
    envs:
      <<: *env_decode
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port
      - $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "70000"
      - --max-num-batched-tokens
      - "256"
      - --max-num-seqs
      - "28"
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.92"
      - --quantization
      - "ascend"
      - --no-enable-prefix-caching
      - --async-scheduling
      - --speculative-config
      - '{"method": "deepseek_mtp", "num_speculative_tokens": 1}'
      - --compilation-config
      - '{"cudagraph_mode":"FULL_DECODE_ONLY", "cudagraph_capture_sizes":[3,4,8,16,24,32,48,56]}'
      - --additional-config
      - '{"recompute_scheduler_enable":true,"multistream_overlap_shared_expert": true}'
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeLayerwiseConnector", "kv_role": "kv_consumer", "kv_port": "30200", "engine_id": "2", "kv_connector_extra_config": {"prefill": {"dp_size": 2, "tp_size": 8}, "decode": {"dp_size": 32, "tp_size": 1}}}'

  - node_index: 3
    envs:
      <<: *env_decode
    server_cmd_template:
      - --host
      - "0.0.0.0"
      - --port
      - $SERVER_PORT
      - --data-parallel-size
      - ${DP_SIZE}
      - --data-parallel-rank
      - ${DP_RANK}
      - --data-parallel-address
      - ${DP_ADDRESS}
      - --data-parallel-rpc-port
      - ${DP_RPC_PORT}
      - --tensor-parallel-size
      - ${TP_SIZE}
      - --enable-expert-parallel
      - --seed
      - "1024"
      - --max-model-len
      - "70000"
      - --max-num-batched-tokens
      - "256"
      - --max-num-seqs
      - "28"
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.92"
      - --quantization
      - "ascend"
      - --no-enable-prefix-caching
      - --async-scheduling
      - --speculative-config
      - '{"method": "deepseek_mtp", "num_speculative_tokens": 1}'
      - --compilation-config
      - '{"cudagraph_mode":"FULL_DECODE_ONLY", "cudagraph_capture_sizes":[3,4,8,16,24,32,48,56]}'
      - --additional-config
      - '{"recompute_scheduler_enable":true,"multistream_overlap_shared_expert": true}'
      - --kv-transfer-config
      - '{"kv_connector": "MooncakeLayerwiseConnector", "kv_role": "kv_consumer", "kv_port": "30200", "engine_id": "2", "kv_connector_extra_config": {"prefill": {"dp_size": 2, "tp_size": 8}, "decode": {"dp_size": 32, "tp_size": 1}}}'

benchmarks:
  acc:
    case_type: accuracy
    dataset_path: vllm-ascend/gpqa
    request_conf: vllm_api_general_chat
    dataset_conf: gpqa/gpqa_gen_0_shot_cot_chat_prompt 
    max_out_len: 32768
    batch_size: 64
    baseline: 80.3
    threshold: 5
    temperature: 0.6
    top_p: 0.95
    ignore_eos: false
    thinking: true
